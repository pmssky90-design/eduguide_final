<main class="container page-layout">
  <article class="page-card">
    <nav class="breadcrumb" aria-label="breadcrumb">{{ breadcrumb }}</nav>
    <p class="eyebrow">{{ page_type }}</p>
    <h1>{{ h1 }}</h1>
    <div class="fixed-images">
      <img class="page-fixed-image" src="/images/thumbs/fixed/001.png" alt="에듀가이드 학습 정보 이미지" loading="lazy">
      <img class="page-fixed-image" src="/images/thumbs/fixed/002.png" alt="에듀가이드 학습 정보 이미지" loading="lazy">
      <img class="page-fixed-image" src="/images/thumbs/fixed/003.png" alt="에듀가이드 학습 정보 이미지" loading="lazy">
      <img class="page-fixed-image" src="/images/thumbs/fixed/004.png" alt="에듀가이드 학습 정보 이미지" loading="lazy">
      <img class="page-fixed-image" src="/images/thumbs/fixed/005.png" alt="에듀가이드 학습 정보 이미지" loading="lazy">
      <img class="page-fixed-image" src="/images/thumbs/fixed/006.png" alt="에듀가이드 학습 정보 이미지" loading="lazy">
    </div>
    <p class="lead">{{ description }}</p>
    <div class="prose">{{ body }}</div>
    <nav class="related-links">
      <h2>관련 페이지</h2>
      {{ related_sections }}
    </nav>
  </article>
</main>
